<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Warecario GitHub Projects</title>
  <meta name="description" content="A simple GitHub repo showcase page for Warecario, using live data and a clean layout." />
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-content">
        <div class="eyebrow"><span></span>By Warecario</div>
        <h1>GitHub repos</h1>
        <p>
          My repos for you to look at if you want.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="https://github.com/Warecario" target="_blank" rel="noreferrer">Visit GitHub</a>
          <button class="button" id="refreshButton" type="button">Reload repos</button>
        </div>
      </div>
    </section>

    <section class="repos-panel">
      <div class="section-heading">
        <h2>Repos</h2>
        <div class="loader" id="repoStatus">Loading repos...</div>
      </div>
      <ul class="repo-list" id="repoGrid"></ul>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
